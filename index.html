<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo_web.png" />
  <link rel="apple-touch-icon" href="/logo_web.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/logo_web.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/logo_web.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com/css2" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossOrigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&display=swap" rel="stylesheet" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نادي الأمن السيبراني - جامعة الطائف</title>
</head>

<body>
  <script>
    window.onerror = function (message, source, lineno, colno, error) {
      console.error(error);
      const root = document.getElementById('root');
      if (root && root.innerHTML === '') {
        const div = document.createElement('div');
        div.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;color:red;background:black;padding:20px;z-index:9999;font-family:monospace;white-space:pre-wrap;overflow:auto;";
        div.innerText = "Runtime Error:\n" + message + "\n\nSource: " + source + ":" + lineno + "\n\nCheck console for more details.";
        document.body.appendChild(div);
      }
    };
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
